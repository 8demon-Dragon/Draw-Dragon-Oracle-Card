"06_Earth and Fire Dragon_p28.jpg": {
chapter: "第 13 章", ebookPage: "P62", bookPage: "P89", nameZh: "土火龍", nameEn: "Earth and Fire Dragon",
content: "【土火龍（Earth and Fire Dragon）的龍族信息】\n\n這些棕色搭配橙色的龍是非常威力強大的，有土元素的平衡以及火元素的克制狂熱。土火龍總是處於平衡，可以廣大無邊地幫助推動你的事業或家庭生活或其他計畫向前邁進。他們也幫助清理地球的雷伊線，建造並維護五維系統，為新的黃金時代做準備。",
practice: "【土火龍的專屬練習：照亮你的挑戰】\n\n召喚土火龍來到你身邊，告訴他你面臨的挑戰並請求他幫忙。騎上他的背，俯視著金色線條交錯的五維雷伊線陣，觀想金色基督之光的火焰在那些交叉點上，看見整個世界亮了起來。"
},
"07_Earth and Water Dragon_p30.jpg": {
chapter: "第 14 章", ebookPage: "P66", bookPage: "P94", nameZh: "土水龍", nameEn: "Earth and Water Dragon",
content: "【土水龍（Earth and Water Dragon）的龍族信息】\n\n這些棕色搭配綠色的龍是溫和而哺育的。土面向提供基礎，你的潛能的種子可以在其中生長，而水則滋養種子，使它們能夠繁茂興旺。當新的機會出現時，這些龍也會幫助你，使你能遇見對的人，打開以前關閉的大門。",
practice: "【土水龍的專屬練習：讓你的創造力綻放】\n\n畫出一棵樹的輪廓，土壤底下有深深的根。想想你的願景正在開花綻放，拿一支粉紅色筆，在樹枝上畫上這棵樹的全部花朵。召請土水龍，請他們幫忙你滋養這個願景。"
},
"08_Air and Fire Dragon_p32.jpg": {
chapter: "第 15 章", ebookPage: "P70", bookPage: "P99", nameZh: "風火龍", nameEn: "Air and Fire Dragon",
content: "【風火龍（Air and Fire Dragon）的龍族信息】\n\n這條藍色搭配橙色的龍，是關於愉快而熱情地傳達你的想法。火元素是有創意且熱誠的，藍色面向則是以鼓舞人心的方式與他人分享你的想法。風火龍煽動創造的火焰，激起你的獨創性和想像力。他們使你感覺生氣勃勃，充滿熱忱，能暢所欲言。",
practice: "【風火龍的專屬練習：放手一搏】\n\n呼喚你的風火龍，告訴他你已經準備好要放手一搏。畫兩座山頂，畫你自己自信地從一座山跳到另一座更高的山。在第二座山頂上畫一扇敞開的金門，將這幅圖像銘記在心。"
},
"09_Air and Water Dragon_p34.jpg": {
chapter: "第 16 章", ebookPage: "P74", bookPage: "P104", nameZh: "風水龍", nameEn: "Air and Water Dragon",
content: "【風水龍（Air and Water Dragon）的龍族信息】\n\n這些藍色搭配綠色的美麗風水龍輕盈而流暢。風啟發靈感，水則流動，因此兩者在一起，他們為你的人生帶來喜悅和自在。風水龍提升你的振動，幫助你連結到更高的頻率。他們也有一種獨特的方法，幫助你開發你的眉心輪，磨練你的心靈才能。",
practice: "【風水龍的專屬練習：表達你的靈魂能量】\n\n請求風水龍進入你的能量場，幫助你表達你內在的歌曲。想到什麼音符，就唱什麼音符，好好聆聽並感覺那個音符。嘗試不同的音符，將它們帶入和諧，聚焦在使你的身體感覺美好的音符。"
},
"10_Fire and Water Dragon_p36.jpg": {
chapter: "第 17 章", ebookPage: "P80", bookPage: "P111", nameZh: "火水龍", nameEn: "Fire and Water Dragon",
content: "【火水龍（Fire and Water Dragon）的龍族信息】\n\n這些色彩鮮豔、橙色搭配綠色的火水龍，是非常強大的運動和改變的力道。火和水一起產生蒸氣，對於推動你在揚升之路上向前邁進，這些龍感到興致勃勃。他們可以幫助將陳舊的關係從你的意識中清理和移除，或是蒸氣清潔你的氣場中的任何乙太污垢。",
practice: "【火水龍的專屬練習：深層淨化】\n\n呼喚一條橙色搭配綠色的火水龍來到你身邊。請求它以完美的方式發送乙太蒸氣貫穿你全身，進行深度清潔。放輕鬆，允許這事發生，願意接受任何東西正在從你的生命中被移除掉。"
},
"11_Golden Christed Dragon_p40.jpg": {
chapter: "第 19 章", ebookPage: "P91", bookPage: "P125", nameZh: "基督化的金龍", nameEn: "Golden Christed Dragon",
content: "【基督化的金龍（Golden Christed Dragon）的龍族信息】\n\n這些美麗的龍擁有巨大的金色能量場，他們以基督之光觸動我們所有人。他們從天狼星的已揚升面拉庫美取用九維頻率的金色基督之光，這是目前在這個宇宙中可以得到的最高階基督能量。當這些龍將光注入你的時候，你能夠在細胞層次吸收它，有助於為新的黃金時代建立你的水晶光體。",
practice: "【基督化的金龍的專屬練習：接收基督之光】\n\n在你的心靈之眼中，放下接地的根，在你自己周圍設置一圈保護。想像將金色的愛吸入你的氣場，吸引一條基督化的金龍。感覺到那條金龍降落在你身邊，邀請你坐在祂的背上，將基督之光的九維金球帶入你可以吸收的維度層級，體驗金色的基督之愛和光在細胞層次流入你體內。"
},
"12_Gold and Silver Violet Flame Dragon_p42.jpg": {
chapter: "第 30 章", ebookPage: "P143", bookPage: "P189", nameZh: "金銀紫焰龍", nameEn: "Gold and Silver Violet Flame Dragon",
content: "【金銀紫焰龍（Gold and Silver Violet Flame Dragon）的龍族信息】\n\n大天使薩基爾的金銀紫焰龍，攜帶著「紫羅蘭火焰」、「恩典的銀色火焰」和「金色的亞特蘭提斯智慧火焰」。他們能幫助你溫婉地轉化你自己和你身邊的一切，用恩典和智慧蛻變低階能量，將它們轉化成為更高階的東西。他們也保護你的氣場，在周圍設置一道金色火焰的保護圈。",
practice: "【金銀紫焰龍的專屬練習：在恩典之下療癒】\n\n點燃一根蠟燭，祈請金銀紫焰龍。指揮他們在恩典之下去到某個人、地方或情境，燒掉低階能量。想像他們火速執行你的命令，將他們的乙太之火注入其中，然後看見更高頻的新能量取而代之。覺察到聖哲曼和大天使薩基爾庇佑那個結果。"
},
"13_Lilac Fire Dragon_p44.jpg": {
chapter: "第 20 章", ebookPage: "P97", bookPage: "P132", nameZh: "淡紫色火龍", nameEn: "Lilac Fire Dragon",
content: "【淡紫色火龍（Lilac Fire Dragon）的龍族信息】\n\n淡紫色火龍攜帶「本源」的「淡紫色火」，那是一種超越的愛和開悟構成的九維能量。他使你能夠平靜而自在地釋放不再有用的一切，提升你的頻率，為你帶來和平、智慧、開悟、喜悅乃至至福。他溫和地洗掉你心輪中保留的任何負面能量，透過神性之愛的力量蛻變老舊。",
practice: "【淡紫色火龍的專屬練習：點燃自由的火焰】\n\n閉上眼睛，臣服於向你滑過來的淡紫色火龍。吸入他們散發出來的愛的純淨，感應到光散播你全身，滌淨你的器官和你的細胞。感覺到陳舊的束縛和限制在純淨的愛中消融，觀想成千上萬的淡紫色火龍將整個地球保持在「自由的火焰」的淡紫色火之中。"
},
"14_Quan Yin's Pink Dragon_p46.jpg": {
chapter: "第 33 章", ebookPage: "P159", bookPage: "P209", nameZh: "觀音的粉紅龍", nameEn: "Quan Yin's Pink Dragon",
content: "【觀音的粉紅龍（Quan Yin's Pink Dragon）的龍族信息】\n\n觀音是「御龍大師」，成千上萬的龍在祂的指導下工作。祂的明亮粉紅龍大量湧入，要幫助人類。祂們使我們沐浴在觀音的光芒中，敞開我們的意識，接受祂的特殊和最深邃的智慧。粉紅龍引導和保護我們，就像對待祂們摯愛的觀音一樣。祂們正在設法療癒人類的本我輪，散播神聖女性智慧。",
practice: "【觀音的粉紅龍的專屬練習：療癒你的關係】\n\n祈請觀音的龍，覺察到這些明亮粉紅色的光之存有在你周圍。請求他們用純淨的愛填滿你的心，將他們的超然的愛大量注入你的本我輪，消融掉任何將你與他人捆綁在一起的羈絆。請求他們幫助你用愛的眼睛看見每一個人內在的神性。"
},
"15_Archangel Gabriel's Dragon_p48.jpg": {
chapter: "第 34 章", ebookPage: "P164", bookPage: "P215", nameZh: "大天使加百列的白色水晶龍", nameEn: "Archangel Gabriel's Dragon",
content: "【大天使加百列的白色水晶龍（Archangel Gabriel's Dragon）的龍族信息】\n\n大天使加百列的龍閃爍著白色的水晶光，他們的願景是讓你備好，走上「鑽石揚升之路」。他們將強烈的白光發送到你的能量場中，清理和淨化你的物質身體，深層滌淨你的細胞，使它們亮起來。這些純白色的龍也與純白色的獨角獸有緣，將渾濁的振動打包，請獨角獸將它們帶入可以蛻變它們的內在層面。",
practice: "【白色水晶龍的專屬練習：成為指路明燈】\n\n呼喚大天使加百列的白龍來到你身邊，感應到他們用一百萬個小小的白光在內在照亮你。感應到他們將一顆巨大的宇宙級鑽石，置於你的氣場上方。在平凡度日時，知道你是指路明燈。"
},
"16_Rainbow Dragon_p50.jpg": {
chapter: "第 21 章", ebookPage: "P101", bookPage: "P137", nameZh: "七彩龍", nameEn: "Rainbow Dragon",
content: "【七彩龍（Rainbow Dragon）的龍族信息】\n\n彩虹不只是大氣條件的物理反應，它也是宇宙的預兆。美麗、神秘的七彩龍帶給你承諾的禮物，當你承認祂的時候，一簇多彩的魔法火焰在你內在點燃。祂可能會從宇宙的豐盛池中汲取某樣東西，或是打開機會之門，或是重新點燃有裨益的前世鏈接。七彩龍帶你越過彩虹，找到等待你的那種金子。",
practice: "【七彩龍的專屬練習：與七彩龍一起旅行】\n\n閉上眼睛，想像一道彩虹跨過天空。看見一條柔軟的七彩龍從彩虹中出現，讓你的心因高興和期待而敞開。騎上他的背，你們快樂地與氣流一起流動。一座巨大的金色大門出現在你的眼前，觸碰它，將它推開，拿起門後那罐屬於你的金子。"
},
"17_Black Dragon_p52.jpg": {
chapter: "第 22 章", ebookPage: "P105", bookPage: "P142", nameZh: "黑龍", nameEn: "Black Dragon",
content: "【黑龍（Black Dragon）的龍族信息】\n\n黑龍很美，而且威力強大。黑色象徵「神聖女性」，攜帶著所有愛、關懷、哺育、慈悲的品質。當你準備好迎接新事物進入你的生命時，這些黑龍將你保持在安全、黑暗的防護膜之中，讓你的秘密希望、隱藏才能、神性潛力的種子能生長和發展。他們鼓勵你靜心冥想，讓天使界可以滴下新的種子。",
practice: "【黑龍的專屬練習：培養新潛能】\n\n收集一些紙和彩色筆，靜靜地呼喚黑龍。畫出一球大大的黑色防護膜的輪廓，在它的中心畫一顆種子，開始長出綠葉。在接下來的日子裡，畫上更多的葉子，最後畫上生長葉子穿過防護膜壁，知道你已經準備就緒要好好擴展。"
},
"18_Emerald Dragon_p54.jpg": {
chapter: "第 35 章", ebookPage: "P168", bookPage: "P220", nameZh: "大天使拉斐爾的祖母綠龍", nameEn: "Emerald Dragon",
content: "【祖母綠龍（Emerald Dragon）的龍族信息】\n\n祖母綠龍與拉斐爾這位療癒和豐盛的祖母綠大天使一起工作。祖母綠龍是五維的，握有你完美健康的靈性願景。他們潛入，設法銷毀那些導致疾病的低階振動。他們也提升你的豐盈意識層級，將豐盛意識填滿你的眉心輪的密室。祖母綠龍保護你的眉心輪，防止別人取用它。",
practice: "【祖母綠龍的專屬練習：滌淨和擦亮眉心輪】\n\n觀想你的眉心輪是一座有九十六間密室的螺旋形。祈請祖母綠龍進入你的眉心輪，將祖母綠光吹入每一間大門敞開的密室。請求大天使拉斐爾將你的眉心輪鏈接到木星和「珍貝」，感應到連結它們的光束就位。"
},
"19_Silver Dragon_p56.jpg": {
chapter: "第 23 章", ebookPage: "P109", bookPage: "P147", nameZh: "銀龍", nameEn: "Silver Dragon",
content: "【銀龍（Silver Dragon）的龍族信息】\n\n銀色是月亮的顏色，與「神聖女性」有關聯。銀龍非常有智慧，散發和平、平靜、溫柔。他們柔和的銀光圍住你，融化掉任何可能阻礙你的靈魂進步的深刻痛苦。銀龍充當鏡子，當你注視他們的時候，你可以看見你的神性自我反映在他們的眼睛裡。他們也自動地在身後留下一長串繁榮。",
practice: "【銀龍的專屬練習：看進你的靈魂鏡子】\n\n邀請一條銀龍來到你身邊。覺察到一道銀色正在靠近，你被一團銀色圈住。那條銀龍舉起一面靈魂鏡子，你向內看。知道你隱藏的天賦、才能或特質可能會開始自行揭露。"
},
"20_Orange Dragon_p58.jpg": {
chapter: "第 24 章", ebookPage: "P113", bookPage: "P152", nameZh: "橙龍", nameEn: "Orange Dragon",
content: "【橙龍（Orange Dragon）的龍族信息】\n\n橙龍正致力於靈魂家族和靈魂社群及時團聚起來，迎接新的黃金時代。他們照亮個人和團體，讓他們相互體認到對方。這些龍噴出接納、溫暖、幸福的火焰，和平地連結人們。橙龍也幫助開發你的臍輪，使你能開發更高的顯化能力。",
practice: "【橙龍的專屬練習：散播和平與友誼】\n\n召請橙龍們，請求他們將氣息吹入你的臍輪。在世界各地看見家家戶戶的前門敞開，看見各地的人們放輕鬆，處於和平的狀態。觀想橙龍們消融掉國家、宗教、社區、個人之間的所有邊界。"
},
"21_Deep Blue Dragon_p60.jpg": {
chapter: "第 37 章", ebookPage: "P176", bookPage: "P230", nameZh: "大天使麥可的深藍龍", nameEn: "Deep Blue Dragon",
content: "【深藍龍（Deep Blue Dragon）的龍族信息】\n\n大天使麥可的深藍龍為世界各地的人們帶來實力、保護、靈感。他們可以用勇氣以及為你的信念挺身而出的實力激發你，建立一道乙太防火牆，保護你免於可能來自不希望你靠自己的力量站穩的人們的攻擊。他們是大師級清除專家，可以清除周圍長達一公里的低階頻率。",
practice: "【深藍龍的專屬練習：清理你周圍的空間】\n\n祈請一支深藍龍大軍，感應到他們朝你席捲而來。請求他們清掃你的住家底下、工作場所、時常進出的購物中心或任何建築物，清理你周圍一公里的空間。好好注意走在清明的能量中有何感覺。"
},
"22_Crystal Yellow Dragon_p62.jpg": {
chapter: "第 36 章", ebookPage: "P172", bookPage: "P225", nameZh: "大天使約菲爾的水晶黃龍", nameEn: "Crystal Yellow Dragon",
content: "【水晶黃龍（Crystal Yellow Dragon）的龍族信息】\n\n大天使約菲爾的水晶黃龍的任務之一是，在你的頂輪附近盤旋，保持這個脈輪純淨而清明。他們滌淨每一片花瓣，解開它的糾結，吹走任何牽絆它的老舊能量。他們保護並強化這些通向宇宙的鏈接，幫助你整合靈性信息和知識。水晶黃龍攜帶著宇宙的五維智慧密碼，當你準備就緒時，可以下載它們進入你。",
practice: "【水晶黃龍的專屬練習：打開你的頂輪的花瓣】\n\n聚焦在你的頂輪，召請大天使約菲爾的水晶黃龍們。觀想你有千片花瓣的頂輪開始甦醒和展開，感應到其中一片花瓣向上伸展，同時一條水晶黃龍吹氣圈住它，解放並滌淨它。調頻進入這片花瓣，感應它正鏈接到什麼地方。"
},
"23_Green Dragon_p64.jpg": {
chapter: "第 25 章", ebookPage: "P118", bookPage: "P158", nameZh: "青龍", nameEn: "Green Dragon",

"25_Sunshine Yellow Dragon_p68.jpg": {

},
"26_Royal Blue Gold Dragon_p70.jpg": {

let deck = [];
let currentActiveMode = null;
let currentSelectedCard = null;

function resetDeck() {
deck = [...CARD_FILES];
document.getElementById('cardDisplay').innerHTML = '<span style="color: #64748b; font-size: 15px; font-weight: 500;">牌組已重置，請抽卡</span>';
document.getElementById('cardInfoBlock').style.display = 'none';
document.getElementById('cardContentDetail').style.display = 'none';
currentActiveMode = null;
currentSelectedCard = null;
updateStatus();
}

function updateStatus() {
document.getElementById('statusText').innerText = `剩餘卡牌：${deck.length} / ${CARD_FILES.length}`;
}

function getGuidePageFromFilename(filename) {
const pageMatch = filename.match(/_p(\d+)\.jpg$/i);
return pageMatch ? `P.${pageMatch[1]}` : '';
}

function displayCardDetails(selectedCard) {
currentSelectedCard = selectedCard;
const displayDiv = document.getElementById('cardDisplay');
displayDiv.innerHTML = `<img src="${selectedCard}" alt="${selectedCard}" id="activeCard">`;

const guidePageNum = getGuidePageFromFilename(selectedCard);
const infoBlock = document.getElementById('cardInfoBlock');
const contentDetail = document.getElementById('cardContentDetail');
const cardData = CARD_DATABASE[selectedCard];

if (cardData) {
document.getElementById('cardChapter').innerText = `📖 ${cardData.chapter}`;
document.getElementById('cardEBookPage').innerText = `📱 e-Book ${cardData.ebookPage}`;
document.getElementById('cardPhysicalBookPage').innerText = `📘 Book ${cardData.bookPage}`;

const guideBadge = document.getElementById('cardGuidePage');
if (guidePageNum) {
guideBadge.innerText = `📙 Guide Book ${guidePageNum}`;
guideBadge.style.display = 'inline-block';
} else {
guideBadge.style.display = 'none';
}

document.getElementById('cardNameZh').innerText = cardData.nameZh;
document.getElementById('cardNameEn').innerText = cardData.nameEn;
infoBlock.style.display = 'flex';

contentDetail.style.display = 'none';
document.getElementById('btnReadContent').innerText = "✨ 龍族信息";
document.getElementById('btnPractice').innerText = "🧘 專屬練習";
currentActiveMode = null;

} else {
const fallbackName = selectedCard.replace(/^\d+_/, '').replace(/_p\d+\.jpg$/i, '');
document.getElementById('cardChapter').innerText = "📖 未知章節";
document.getElementById('cardEBookPage').innerText = "📱 P.00";
document.getElementById('cardPhysicalBookPage').innerText = "📘 P.00";
document.getElementById('cardNameZh').innerText = fallbackName;
document.getElementById('cardNameEn').innerText = "";
infoBlock.style.display = 'flex';
contentDetail.style.display = 'none';
currentActiveMode = null;
}
}

function toggleCardContent(mode) {
const contentDetail = document.getElementById('cardContentDetail');
const btnInfo = document.getElementById('btnReadContent');
const btnPractice = document.getElementById('btnPractice');
const titleEl = document.getElementById('contentDetailTitle');
const textBodyEl = document.getElementById('cardTextBody');

const cardData = CARD_DATABASE[currentSelectedCard];
if (!cardData) return;

if (currentActiveMode === mode) {
contentDetail.style.display = 'none';
btnInfo.innerText = "✨ 龍族信息";
btnPractice.innerText = "🧘 專屬練習";
currentActiveMode = null;
return;
}

if (mode === 'info') {
titleEl.innerText = `✨ ${cardData.nameZh} 龍族信息`;
titleEl.className = "title-info";
textBodyEl.innerText = cardData.content || "暫無詳細信息文字。";
contentDetail.className = "card-content-detail border-info";
btnInfo.innerText = "❌ 關閉信息";
btnPractice.innerText = "🧘 專屬練習";
currentActiveMode = 'info';
} else if (mode === 'practice') {
titleEl.innerText = `🧘 ${cardData.nameZh} 專屬練習`;
titleEl.className = "title-practice";
textBodyEl.innerText = cardData.practice || "暫無專屬練習文字。";
contentDetail.className = "card-content-detail border-practice";
btnInfo.innerText = "✨ 龍族信息";
btnPractice.innerText = "❌ 關閉練習";
currentActiveMode = 'practice';
}

contentDetail.style.display = 'block';
contentDetail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function drawCard() {
if (deck.length === 0) {
const displayDiv = document.getElementById('cardDisplay');
displayDiv.innerHTML = '<span style="color: #f43f5e; font-size: 15px; font-weight: 500;">卡牌已經抽完啦！請點擊下方「重新洗牌」按鈕。</span>';
document.getElementById('cardInfoBlock').style.display = 'none';
document.getElementById('cardContentDetail').style.display = 'none';
return;
}

const randomIndex = Math.floor(Math.random() * deck.length);
const selectedCard = deck.splice(randomIndex, 1)[0];

displayCardDetails(selectedCard);
updateStatus();
}

function selectCardFromList(filename) {
displayCardDetails(filename);
closeAllCards();
}

function openAllCards() {
const modal = document.getElementById('allCardsModal');
const grid = document.getElementById('cardsGrid');

if (grid.children.length === 0) {
CARD_FILES.forEach(filename => {
const cardData = CARD_DATABASE[filename] || { nameZh: "未知卡牌", nameEn: "" };

const item = document.createElement('div');
item.className = 'grid-item';
item.onclick = () => selectCardFromList(filename);

item.innerHTML = `
<div class="grid-item-img-container">
<img src="${filename}" alt="${cardData.nameZh}" onerror="this.src='https://placehold.co/120x170/1e293b/94a3b8?text=${encodeURIComponent(cardData.nameZh)}'">
</div>
<div class="grid-item-name-zh">${cardData.nameZh}</div>
<div class="grid-item-name-en">${cardData.nameEn}</div>
`;

grid.appendChild(item);
});
}

modal.classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeAllCards() {
const modal = document.getElementById('allCardsModal');
modal.classList.remove('active');
document.body.style.overflow = '';
}

resetDeck();
</script>
</body>
</html>
